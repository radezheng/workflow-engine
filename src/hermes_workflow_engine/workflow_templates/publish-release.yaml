id: publish-release
name: Publish Release
description: Nested workflow for authorized packaging, deployment, release notes, and post-publish verification.
version: 1
parameters:
  pm_profile:
    default: designer
  reviewer_profile:
    default: reviewer
  publish_prompt_template:
    default: operator/recovery-plan
  planning_review_prompt_template:
    default: reviewer/planning-review
  recovery_prompt_template:
    default: pm/recovery-plan
profiles:
  pm: ${pm_profile}
  reviewer: ${reviewer_profile}
prompt_templates:
  publish_plan: ${publish_prompt_template}
  planning_review: ${planning_review_prompt_template}
  recovery_plan: ${recovery_prompt_template}
planning_task:
  stage: publish-plan
  title: 规划发布流程
  kind: planning
  profile: ${reviewer_profile}
  prompt_template_ref: ${publish_prompt_template}
  prompt_text: 在明确授权后规划发布、回滚、发布说明和发布后验证。
  skills: [hwe]
  outputs: [发布计划]
  gates: [授权明确, 回滚路径明确, 发布后验证明确]
review_tasks:
  - stage: publish-plan-review
    title: Review publish plan before task breakdown
    kind: review
    profile: ${reviewer_profile}
    prompt_template_ref: ${planning_review_prompt_template}
    prompt_text: Review the upstream publish plan before task breakdown. Verify authorization, target environment, rollback path, credential handling, and post-publish verification. If the plan is not materializable, fail with concrete blocking findings.
    outputs: [publish plan review findings]
    gates: [authorization and rollback are clear, publish tasks are materializable]
    skills: [hwe]
    priority_offset: 1
materialize:
  sources:
    - stage: publish-plan-review
      prompt_template_ref: ${planning_review_prompt_template}
      statuses: [succeeded]
  task:
    stage: publish-breakdown
    title: 将发布计划物化为任务
    kind: planning
    profile: ${reviewer_profile}
    prompt_template_ref: ${publish_prompt_template}
    outputs: [已创建发布任务图]
    gates: [保留授权证据, 包含回滚和验证任务]
    skills: [hwe]
    priority_offset: 1
  input_prompt: |
    读取发布计划并创建发布、回滚准备、发布说明和发布后验证任务。

    项目根目录：${project_root}
    Workflow id：${workflow_id}
    Publish plan stdout 路径：${stdout_path}
    Publish plan review stdout 路径：${review_stdout_path}

    如果缺少发布授权、凭据、目标环境或回滚策略，请请求 human action。
task_completion:
  sources:
    - statuses: [succeeded, failed, cancelled, skipped, superseded, waiting_for_info, waiting_for_approval]
  post_execution:
    stage: publish-pm-task-completion-decision
    title: "PM Decision: ${source_task_title}"
    kind: post_execution
    profile: ${pm_profile}
    prompt_template_ref: ${recovery_prompt_template}
    outputs: [发布推进决策, 后续发布/回滚/验证任务, workflow template 改进建议]
    gates: [已检查 source run 证据, 已确认授权边界, 已提出必要建议]
    skills: [hwe]
  input_prompt: |
    一个 publish workflow task 已完成。读取 source run 证据、发布授权边界和当前任务图，决定是继续发布流程、等待人工授权、retry、替换验证 task、创建 fix task，还是重新规划发布/回滚。

    项目根目录：${project_root}
    Project id：${project_id}
    Workitem id：${workitem_id}
    Workflow id：${workflow_id}
    Source task id：${source_task_id}
    Source task 标题：${source_task_title}
    Source task kind/profile/status：${source_task_kind} / ${source_task_profile} / ${source_task_status}
    Source run id：${source_run_id}
    stdout 路径：${stdout_path}
    stderr 路径：${stderr_path}
    result JSON：${result_json}

    HWE 控制面：
    ${hwe_control_context}

    不要扩大发布授权，不要删除历史，不要把人工输入伪装成 task。replacement 必须修正失败根因；如果 replacement 是 `kind=command`，`prompt_text` 必须是可直接执行的 shell 命令。必要时请求 human action；如果下一步依赖用户回答，创建 human action 后必须停止，不要同时创建或运行依赖未回答决策的任务。
    如果决定继续，必须实际执行 HWE CLI 排队下一步 run request；不要只在输出里说“will request”。
    如果当前 publish workflow template 或 prompt 应该改进以避免同类问题或提升推进质量，请输出具体建议和原因。